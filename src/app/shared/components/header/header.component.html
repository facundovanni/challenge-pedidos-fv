<header
  class="h-14 border-b border-zinc-200 bg-white px-4 md:px-8 flex items-center justify-between shrink-0 select-none">
  <a routerLink="/"
    class="text-xl font-bold tracking-widest text-zinc-900 hover:text-zinc-500 transition-colors uppercase">
    Pedidos Fast
  </a>

    <a routerLink="/cart" class="flex items-center gap-3 px-6 py-2 border-2 rounded-xl border-black bg-black text-white font-bold text-lg active:scale-95 focus:ring-2 focus:ring-black focus:outline-none">
      Ver Carrito
      @if (cartService.totalItems() > 0) {
      <span class="flex items-center justify-center min-w-6 h-6 px-2 bg-white text-black font-black text-sm">
        {{ cartService.totalItems() }}
      </span>
      }
    </a>

</header>
