<div class="flex items-center justify-between border-2 border-zinc-900 rounded-xl bg-zinc-50 overflow-hidden">
  <button (click)="decrement.emit()"
          class="w-1/3 py-4 text-3xl font-black text-zinc-900 hover:bg-zinc-200 active:bg-zinc-300 transition-colors cursor-pointer select-none">
    -
  </button>

  <span class="w-1/3 text-center text-2xl font-black text-zinc-900 select-none">
    {{ quantity() }}
  </span>

  <button (click)="increment.emit()"
          class="w-1/3 py-4 text-3xl font-black text-zinc-900 hover:bg-zinc-200 active:bg-zinc-300 transition-colors cursor-pointer select-none">
    +
  </button>
</div>
