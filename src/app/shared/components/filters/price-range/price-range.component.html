<div class="flex flex-col gap-2">
  <label class="text-sm font-bold uppercase tracking-widest text-zinc-500 pl-2">
    {{ label() }}
  </label>
  <div class="flex items-center gap-2">
    <input #minRef type="number" placeholder="Min" (input)="onInput()"
      class="pl-10 px-4 py-4 text-xl bg-zinc-50 border-2 border-zinc-200 rounded-2xl focus:border-zinc-900 focus:bg-white focus:outline-none transition-all" />
    <span class="text-zinc-400 font-bold">-</span>
    <input #maxRef type="number" placeholder="Max" (input)="onInput()"
      class="pl-10 px-4 py-4 text-xl bg-zinc-50 border-2 border-zinc-200 rounded-2xl focus:border-zinc-900 focus:bg-white focus:outline-none transition-all" />
  </div>
</div>
