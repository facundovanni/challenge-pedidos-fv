<div class="flex flex-col gap-2">
  <label class="text-sm font-bold uppercase tracking-widest text-zinc-500 pl-2">
    {{ label() }}
  </label>
  <div class="flex items-center gap-3">
    <div class="relative flex-1">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl font-bold text-zinc-400">$</span>
      <input #priceInput type="number" placeholder="Min" (change)="updateMin($event)"
             class="w-full pl-10 pr-4 py-4 text-xl bg-zinc-50 border-2 border-zinc-200 rounded-2xl..." />
    </div>

    <span class="text-zinc-400 font-bold">-</span>

    <div class="relative flex-1">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl font-bold text-zinc-400">$</span>
      <input #priceInput type="number" placeholder="Max" (change)="updateMax($event)"
             class="w-full pl-10 pr-4 py-4 text-xl bg-zinc-50 border-2 border-zinc-200 rounded-2xl..." />
    </div>
  </div>
</div>
