<div class="flex flex-col justify-between h-full p-6 bg-white border border-zinc-200 rounded-2xl shadow-sm">
  <div class="mb-8">
    <span class="text-md font-semibold uppercase tracking-wider text-zinc-500 mb-1 block">
      {{ product().category.name }}
    </span>
    <div class="flex items-start justify-between gap-4">
      <h3 class="text-2xl font-black text-zinc-900 leading-tight">
        {{ product().name }}
      </h3>

      <a [routerLink]="['/products', product().id]"
         class="p-2 text-zinc-400 hover:text-black focus:ring-2 focus:ring-zinc-900 rounded-full cursor-pointer shrink-0 transition-colors"
         aria-label="Ver detalle del producto">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </a>
    </div>

    <p class="text-2xl mt-3 font-bold text-zinc-700">
      {{ product().price | currency:'$':'symbol':'1.0-0' }}
    </p>
  </div>

  <div class="mt-auto">
    @if (quantity() === 0) {
    <button (click)="onAdd()"
      class="w-full place-content-center py-5 text-2xl font-bold text-white bg-zinc-900 hover:bg-zinc-800 rounded-xl focus:outline-none focus:ring-4 focus:ring-zinc-300 transition-colors active:scale-95 cursor-pointer">
      Agregar
    </button>
    } @else {
    <app-stepper
        [quantity]="quantity()"
        (increment)="onAdd()"
        (decrement)="onRemove()"
      />
    }
  </div>
</div>
