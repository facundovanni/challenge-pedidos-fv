<div class="flex flex-col xl:flex-row gap-8 p-6 bg-white border border-zinc-200 rounded-3xl shadow-sm items-end">

  <div class="w-full xl:w-1/3">
    <app-search-input
      placeholder="Buscar producto..."
      (search)="onSearch($event)"
      [initialValue]="searchTerm()">
    </app-search-input>
  </div>

  <div class="flex flex-col sm:flex-row items-end gap-6 w-full xl:w-auto flex-1">

    <app-select-filter
      label="Categoría"
      [options]="categories()"
      [initialValue]="selectedCategory()"
      (selectionChanged)="onCategoryChange($event)">
    </app-select-filter>

    <app-price-range
      label="Rango de Precio"
      [initialMin]="priceMin()"
      [initialMax]="priceMax()"
      (rangeChanged)="onPriceChange($event)">
    </app-price-range>

    <button (click)="onReset()"
            class="px-6 py-4 text-xl font-bold text-zinc-400 hover:text-zinc-900 transition-colors cursor-pointer select-none active:scale-95 shrink-0">
      Limpiar filtros
    </button>

  </div>
</div>
