<div class="max-w-4xl mx-auto flex flex-col h-full">

  <div class="mb-8">
    <a routerLink="/products"
      class="inline-block px-8 py-4 border-2 rounded-2xl border-black bg-white text-black font-bold text-xl active:scale-95 focus:ring-4 focus:ring-gray-300 focus:outline-hidden">
      ← Volver al listado
    </a>
  </div>

  @if (isLoading()) {
  <div class="grow flex items-center justify-center text-2xl font-bold text-gray-500">
    Cargando producto...
  </div>
  } @else {
  @if (product(); as p) {
  <div class="flex flex-col md:flex-row gap-12 items-start bg-white p-8 border-4 border-gray-100">

    @if(p.imageUrl){
    <div
      class="w-full md:w-1/2 aspect-square bg-gray-100 flex items-center justify-center border-2 border-gray-200 overflow-hidden">
      <img [src]="p.imageUrl" [alt]="p.name" class="w-full h-full object-cover" loading="lazy">
    </div>
    }


    <div class="w-full md:w-1/2 flex flex-col gap-6">
      <span class="text-gray-500 font-bold uppercase tracking-widest text-lg">{{ p.category.name }}</span>
      <h1 class="text-5xl font-black text-black leading-tight">{{ p.name }}</h1>
      <p class="text-4xl font-extrabold text-black mt-4">
        {{ p.price | currency:'$':'symbol':'1.0-0' }}
      </p>

      @if(p.description) {
      <p class="text-xl text-gray-600 mt-6 leading-relaxed">
        {{p.description}}
      </p>
      }

      <hr class="border-gray-200 my-4">

      <button (click)="onAddToCart(p)"
        class="w-full px-12 py-6 bg-black text-white rounded-2xl text-2xl font-black active:scale-95 focus:ring-4 focus:ring-gray-300 focus:outline-hidden mt-auto">
        Agregar al Carrito
      </button>
    </div>
  </div>
  } @else {
  <div class="grow flex flex-col items-center justify-center gap-6">
    <h2 class="text-4xl font-black text-black">Producto no encontrado</h2>
    <a routerLink="/products" class="px-8 py-4 bg-black rounded-2xl text-white font-bold text-xl active:scale-95">Ver
      otros productos</a>
  </div>
  }
  }
</div>
