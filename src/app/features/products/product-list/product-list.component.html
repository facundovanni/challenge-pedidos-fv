<div class="flex flex-col gap-8 h-full">

  <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
    <div>
      <h1 class="text-5xl font-black tracking-tight text-zinc-900">
        Catálogo
      </h1>
      <p class="text-2xl text-zinc-500 mt-2 font-medium">
        Seleccioná los productos para armar tu pedido
      </p>
    </div>

    <div class="flex p-2 bg-zinc-200 rounded-2xl select-none">
      <button (click)="toggleView('grid')" class="px-8 py-4 rounded-xl text-xl font-bold transition-all cursor-pointer"
        [class]="viewMode() === 'grid' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500 hover:text-zinc-700'">
        Grilla
      </button>
      <button (click)="toggleView('list')" class="px-8 py-4 rounded-xl text-xl font-bold transition-all cursor-pointer"
        [class]="viewMode() === 'list' ? 'bg-white shadow-sm text-zinc-900' : 'text-zinc-500 hover:text-zinc-700'">
        Lista
      </button>
    </div>
  </header>

  <app-product-toolbar (queryChanged)="onQueryChanged($event)" [initialParams]="queryParams()">
  </app-product-toolbar>

  @if (isLoading()) {
  <div class="flex justify-center items-center py-20 grow">
    <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-zinc-900"></div>
  </div>
  } @else {
  <section class="grow pb-12">
    <div
      [class]="viewMode() === 'grid' ? 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8' : 'flex flex-col gap-6'">

      @for (product of products(); track product.id) {
      <app-product-item [product]="product" [quantity]="getQuantity(product.id)" (add)="onAddToCart($event)"
        (remove)="onRemoveFromCart($event)">
      </app-product-item>
      } @empty {

      <div
        class="col-span-full flex flex-col items-center justify-center py-24 text-center bg-zinc-50 rounded-3xl border-2 border-dashed border-zinc-200">
        <svg class="w-20 h-20 text-zinc-400 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <p class="text-3xl text-zinc-900 font-black tracking-tight">No encontramos productos</p>
      </div>

      }
    </div>
  </section>
  }
</div>
