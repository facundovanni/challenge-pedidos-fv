<div class="max-w-5xl mx-auto py-12 px-6 flex flex-col h-full">

  <div class="flex justify-between items-center mb-10">
    <h1 class="text-5xl font-black text-black tracking-tighter">Tu Pedido</h1>
    <div class="flex gap-8">
      <button (click)="cartService.clearCart()"
        class="text-xl font-bold text-gray-500 hover:text-black underline focus:ring-2 focus:ring-black focus:outline-none">
        Vaciar carrito
      </button>
      <a routerLink="/products"
        class="text-xl font-bold text-gray-500 hover:text-black underline focus:ring-2 focus:ring-black focus:outline-none">
        Volver a productos
      </a>
    </div>
  </div>

  @if (cartService.cartItems().length === 0) {
  <div class="flex-1 flex flex-col items-center justify-center py-32 bg-gray-50 border-2 border-gray-200">
    <p class="text-3xl text-gray-500 mb-10 font-bold">Tu carrito está vacío</p>
    <a routerLink="/products"
      class="px-12 py-6 bg-black text-white text-2xl font-black active:scale-95 focus:ring-2 focus:ring-black focus:outline-none">
      Elegir Productos
    </a>
  </div>
  } @else {
  <div class="flex flex-col gap-8 flex-1">

    <div class="flex flex-col border-t border-gray-200">
      @for (item of cartService.cartItems(); track item.product.id) {
      <app-cart-item
        [item]="item"
        (remove)="cartService.removeFromCart(item.product.id)"
        (increase)="cartService.addToCart(item.product)"
        (decrease)="cartService.decreaseQuantity(item.product.id)">
      </app-cart-item>
      }
    </div>

    <div class="mt-auto p-8 bg-gray-50 border-2 border-black flex justify-between items-center">
      <div class="flex flex-col">
        <span class="text-lg text-gray-500 font-bold uppercase tracking-widest">Total a Pagar</span>
        <span class="text-5xl font-black text-black mt-1">
          {{ cartService.totalPrice() | currency:'$':'symbol':'1.0-0' }}
        </span>
      </div>

      <a routerLink="/checkout"
        class="px-12 py-6 bg-black text-white text-2xl font-black active:scale-95 focus:ring-2 focus:ring-black focus:outline-none">
        Proceder al Pago
      </a>
    </div>
  </div>
  }
</div>
