<div class="flex justify-between items-center p-6 border-b border-gray-200 bg-white">

  <div class="flex flex-col">
    <h2 class="text-3xl font-black text-black tracking-tight">{{ item().product.name }}</h2>
    <p class="text-2xl text-gray-500 font-bold mt-2">
      {{ item().product.price | currency:'$':'symbol':'1.0-0' }}
    </p>
  </div>

  <div class="flex items-center gap-6">

    <div class="flex items-center border-2 border-black bg-white">
      <button (click)="onDecrease()"
        class="px-6 py-4 text-3xl font-black text-black hover:bg-gray-100 active:bg-gray-200 focus:ring-2 focus:ring-black focus:outline-none cursor-pointer select-none">
        -
      </button>

      <span class="px-6 py-4 font-black text-3xl text-black border-x-2 border-black min-w-20 text-center select-none">
        {{ item().quantity }}
      </span>

      <button (click)="onIncrease()"
        class="px-6 py-4 text-3xl font-black text-black hover:bg-gray-100 active:bg-gray-200 focus:ring-2 focus:ring-black focus:outline-none cursor-pointer select-none">
        +
      </button>
    </div>

    <button (click)="onRemove()"
      class="px-8 py-5 border-2 border-black rounded-2xl bg-white hover:bg-gray-100 text-black text-xl font-bold active:scale-95 focus:ring-2 focus:ring-black focus:outline-none">
      Quitar
    </button>
  </div>
</div>
